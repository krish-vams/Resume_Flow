services:
  - type: web
    name: resumeflow-backend
    runtime: docker
    rootDir: backend
    plan: starter
    healthCheckPath: /health
    disk:
      name: resumeflow-uploads
      mountPath: /app/uploads
      sizeGB: 10
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: resumeflow-postgres
          property: connectionString
      - key: FORMATTER_SERVICE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: resumeflow-redis
          property: connectionString
      - key: LOCAL_STORAGE_PATH
        value: /app/uploads
      - key: STORAGE_PROVIDER
        value: local
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_BASE_URL
        value: https://generativelanguage.googleapis.com
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
      - key: GMAIL_REDIRECT_URI
        sync: false

  - type: web
    name: resumeflow-formatter
    runtime: docker
    rootDir: formatter-service
    plan: starter
    healthCheckPath: /health
    disk:
      name: resumeflow-formatter-outputs
      mountPath: /app/outputs
      sizeGB: 5
    envVars:
      - key: FORMATTER_OUTPUT_DIR
        value: /app/outputs
      - key: FORMATTER_MAX_UPLOAD_BYTES
        value: "10485760"
      - key: BASE_RESUME_TEMPLATE_PATH
        sync: false

  - type: redis
    name: resumeflow-redis
    plan: starter
    ipAllowList: []

databases:
  - name: resumeflow-postgres
    plan: starter
    databaseName: resumeflow
    user: resumeflow
